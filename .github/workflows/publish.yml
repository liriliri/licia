name: Publish to NPM

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  publish:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Build licia
        run: npm i && npm link && npm run build
      - name: Publish package on NPM
        working-directory: .licia/packages
        run: |
          npm i -g npm@11
          cd licia
          npm publish
          cd ../licia-es
          npm publish
          cd ../eustia-module
          npm publish
          cd ../miniprogram-licia
          npm publish